<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Wanted List</title>
    
    <style>
        /* 기본 스타일 초기화 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            line-height: 1.6;
            background-color: #f4f4f4;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background-color: #333;
            color: #ff4d4d;
            padding: 20px 0;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .main-title {
            font-size: 2.5rem;
            margin: 0;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-weight: bold;
            margin-bottom: 30px;
        }

        /* 수배 명단 카드 레이아웃 */
        .wanted-grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .wanted-card {
            background: white;
            border: 5px solid #333;
            padding: 15px;
            width: 300px;
            text-align: center;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
        }

        .wanted-card h2 {
            margin: 10px 0;
            background: #333;
            color: white;
            padding: 5px;
        }

        .wanted-card img {
            width: 100%;
            height: 350px;
            object-fit: cover; /* 이미지 비율 유지하며 채우기 */
            border: 2px solid #eee;
        }

        figcaption {
            margin-top: 15px;
            font-weight: bold;
            color: #d9534f;
            text-transform: uppercase;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="main-title">Wanted List</h1>
    </header>

    <main class="container">
        <p class="subtitle">Bad guys will be executed!!</p>
        
        <section class="wanted-grid">
            <!-- Target 1: Bad Yeop -->
            <article class="wanted-card">
                <h2>Bad Yeop</h2>
                <figure>
                    <img src="./yg.jpg" alt="yeop gay">
                    <figcaption>Dead or Alive</figcaption>
                </figure>
            </article>

            <!-- Target 2: Bad CP -->
            <article class="wanted-card">
                <h2>Bad CP</h2>
                <figure>
                    <img src="./cp.jpg" alt="chan park">
                    <figcaption>Dead or Alive</figcaption>
                </figure>
            </article>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Your Name. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
